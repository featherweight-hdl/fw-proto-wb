# yaml-language-server: $schema=https://dv-flow.github.io/flow.dv.schema.json
fragment:
  # Unnamed fragment (see src/flow.yaml) -- tasks live under the package, e.g.
  # fw.proto.wb.wb-proto.
  tasks:
  # REQUIRED back-to-back simulation test (design §8a): drives the full kit stack
  # and checks round-trip integrity, backpressure, ERR, monitor.
  - name: wb-proto-tb
    uses: std.FileSet
    with:
      type: systemVerilogSource
      include:
      - wb_proto_tb.sv
      incdirs:
      - .

  - name: wb-proto-img
    uses: hdlsim.vlt.SimImage
    needs: [files, wb-proto-tb]
    with:
      top: [wb_proto_tb]
      # exercise the protocol checker's concurrent-SVA layer in sim too
      defines:
      - WB_PROTO_SVA

  - root: wb-proto
    uses: hdlsim.vlt.SimRun
    needs: [wb-proto-img]
